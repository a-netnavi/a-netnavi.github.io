<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建築家ネットワーク・ナビ | 公式リンク集</title>
    
    <!-- Tailwind CSS (スタイリングに使用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            /* 高級感を出すための微かなグラデーション背景 */
            background-image: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
        }
        
        /* リンクボタンのホバーアニメーション */
        .link-card {
            transition: all 0.3s ease;
        }
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 text-gray-800">

    <!-- メインコンテナ（スマホサイズに最適化） -->
    <div class="max-w-md w-full mx-auto pb-12 pt-6">
        
        <!-- ヘッダー（プロフィール・ロゴ部分） -->
        <div class="text-center mb-10">
            <!-- ロゴ画像のプレースホルダー（必要に応じて <img> タグに変更してください） -->
            <div class="w-24 h-24 mx-auto mb-5 bg-gray-900 rounded-full flex items-center justify-center shadow-md border-4 border-white">
                <!-- 建築をイメージしたアイコン -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            
            <h1 class="text-2xl font-bold tracking-widest text-gray-900 mb-2">A-net navi</h1>
            <div class="w-12 h-0.5 bg-gray-300 mx-auto mb-4"></div>
            <p class="text-sm text-gray-600 font-medium leading-relaxed px-4">
                建築家との家づくり・施設建築をサポート<br>
                理想の建築プロジェクトを実現します
            </p>
        </div>

        <!-- リンクボタングループ -->
        <div class="space-y-4">
            
            <!-- ①設計コンペとは？ -->
            <a href="http://a-netnavi.jp/about/" target="_blank" rel="noopener noreferrer" class="link-card block bg-white border border-gray-200 rounded-lg py-4 px-6 text-center font-medium hover:bg-gray-50 relative overflow-hidden group">
                <!-- ホバー時のアクセントライン -->
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gray-800 group-hover:w-1.5 transition-all duration-300"></div>
                <div class="flex items-center justify-center w-full relative z-10 pl-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span>設計コンペとは？</span>
                </div>
            </a>

            <!-- ②実績紹介 -->
            <a href="http://a-netnavi.jp/archive/" target="_blank" rel="noopener noreferrer" class="link-card block bg-white border border-gray-200 rounded-lg py-4 px-6 text-center font-medium hover:bg-gray-50 relative overflow-hidden group">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gray-800 group-hover:w-1.5 transition-all duration-300"></div>
                <div class="flex items-center justify-center w-full relative z-10 pl-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span>実績紹介</span>
                </div>
            </a>

            <!-- ③公式サイト -->
            <a href="http://a-netnavi.jp/" target="_blank" rel="noopener noreferrer" class="link-card block bg-white border border-gray-200 rounded-lg py-4 px-6 text-center font-medium hover:bg-gray-50 relative overflow-hidden group">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gray-800 group-hover:w-1.5 transition-all duration-300"></div>
                <div class="flex items-center justify-center w-full relative z-10 pl-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>公式サイト</span>
                </div>
            </a>

            <!-- ④事業主向けサイト -->
            <a href="http://a-netnavi.jp/" target="_blank" rel="noopener noreferrer" class="link-card block bg-white border border-gray-200 rounded-lg py-4 px-6 text-center font-medium hover:bg-gray-50 relative overflow-hidden group">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gray-800 group-hover:w-1.5 transition-all duration-300"></div>
                <div class="flex items-center justify-center w-full relative z-10 pl-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <span>事業主向けサイト</span>
                </div>
            </a>

            <!-- セパレーター（事業主向けと建築家向けを分ける） -->
            <div class="pt-4 pb-2">
                <div class="w-full border-t border-gray-200 border-dashed"></div>
            </div>

            <!-- ⑤建築家向けサイト (少しデザインを変えて目立たせる) -->
            <a href="https://houseinfo.jp/lp/anet01/" target="_blank" rel="noopener noreferrer" class="link-card block bg-gray-900 text-white rounded-lg py-4 px-6 text-center font-medium hover:bg-gray-800 shadow-md relative overflow-hidden group">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gray-500 group-hover:w-1.5 transition-all duration-300"></div>
                <div class="flex items-center justify-center w-full relative z-10 pl-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z" />
                    </svg>
                    <span class="tracking-wide">建築家向けサイト</span>
                </div>
            </a>

        </div>

        <!-- フッター -->
        <div class="mt-12 text-center">
            <p class="text-xs text-gray-400 tracking-wider">&copy; A-net navi. All rights reserved.</p>
        </div>
        
    </div>

</body>
</html>
